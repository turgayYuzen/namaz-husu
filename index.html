<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Namaz Huşu</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
  body { background:#0a0e0c; font-family:'Tajawal','Segoe UI',sans-serif; color:#e8f5ee; }
  @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap');
  @keyframes flashPulse { 0%,100%{opacity:0} 50%{opacity:1} }
  @keyframes pulse      { 0%,100%{opacity:1} 50%{opacity:.4} }
  @keyframes pulsefast  { 0%,100%{opacity:1} 50%{opacity:.2} }
  @keyframes bounce     { 0%,100%{transform:translateY(0)} 50%{transform:translateY(5px)} }
  @keyframes fadeIn     { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes countPop   { 0%{transform:scale(1.6);opacity:0} 100%{transform:scale(1);opacity:1} }
  input[type=range]                        { -webkit-appearance:none; height:4px; border-radius:2px; background:rgba(255,255,255,.2); outline:none; width:100%; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:#52b788; box-shadow:0 0 8px rgba(82,183,136,.6); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;
const CALIB_NEEDED = 60;

function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
    const s = document.createElement("script");
    s.src = src; s.crossOrigin = "anonymous";
    s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

// İrisin göz köşelerine göre göreli konumu → baş hareketi iptal edilir
function getNormalizedGaze(lm) {
  function eyeRelative(irisIdx, outerIdx, innerIdx, topIdx, botIdx) {
    const iris = lm[irisIdx], outer = lm[outerIdx], inner = lm[innerIdx];
    const top  = lm[topIdx],  bot   = lm[botIdx];
    const w = Math.hypot(inner.x - outer.x, inner.y - outer.y);
    const h = Math.hypot(top.x - bot.x, top.y - bot.y);
    if (w < 0.001 || h < 0.001) return null;
    return { x: (lm[irisIdx].x - (outer.x+inner.x)/2) / w,
             y: (lm[irisIdx].y - (top.y+bot.y)/2)     / h };
  }
  const L = eyeRelative(468, 33,  133, 159, 145);
  const R = eyeRelative(473, 362, 263, 386, 374);
  if (!L || !R) return null;
  return { x: (L.x+R.x)/2, y: (L.y+R.y)/2 };
}

function eyeOpenRatio(lm) {
  const v = Math.abs(lm[159].y - lm[145].y);
  const h = Math.abs(lm[33].x  - lm[133].x);
  return h > 0 ? v/h : 0;
}

function App() {
  const [screen, setScreen]           = useState("setup");
  const [mode, setMode]               = useState("front");
  const [statusType, setStatusType]   = useState("loading");
  const [statusTitle, setStatusTitle] = useState("Kamera bekleniyor...");
  const [statusSub, setStatusSub]     = useState("");
  const [sensitivity, setSensitivity] = useState(5);
  const [noFace, setNoFace]           = useState(false);
  const [flashActive, setFlashActive] = useState(false);
  const [calibPct, setCalibPct]       = useState(0);
  const [camError, setCamError]       = useState("");
  const [countdown, setCountdown]     = useState(0); // geri sayım: 3,2,1,0

  const videoRef       = useRef(null);
  const streamRef      = useRef(null);
  const faceMeshRef    = useRef(null);
  const mpCamRef       = useRef(null);
  const baselineRef    = useRef(null);
  const calibFrames    = useRef([]);
  const isDistracted   = useRef(false);
  const flashInterval  = useRef(null);
  const torchTrack     = useRef(null);
  const flashOn        = useRef(false);
  const sensitivityRef = useRef(5);
  const modeRef        = useRef("front");
  const mountedRef     = useRef(true);

  sensitivityRef.current = sensitivity;
  modeRef.current        = mode;
  useEffect(() => { mountedRef.current = true; return () => { mountedRef.current = false; }; }, []);

  // ── UYARI ──────────────────────────────────────────────────────────────────
  const stopAlert = useCallback(() => {
    flashOn.current = false;
    setFlashActive(false);
    if (flashInterval.current) { clearInterval(flashInterval.current); flashInterval.current = null; }
    try { torchTrack.current?.applyConstraints({ advanced:[{ torch:false }] }); } catch {}
  }, []);

  const startAlert = useCallback(() => {
    if (flashOn.current) return;
    flashOn.current = true;
    if (modeRef.current === "front") {
      setFlashActive(true);
    } else {
      let t = false;
      flashInterval.current = setInterval(async () => {
        t = !t;
        try { await torchTrack.current?.applyConstraints({ advanced:[{ torch:t }] }); }
        catch { clearInterval(flashInterval.current); setFlashActive(true); }
      }, 300);
    }
  }, []);

  // ── KALİBRASYON SIFIRLA ────────────────────────────────────────────────────
  const resetCalib = useCallback(() => {
    baselineRef.current = null; calibFrames.current = []; isDistracted.current = false;
    stopAlert(); setCalibPct(0); setNoFace(false);
    setStatusType("loading");
    setStatusTitle("Yeniden kalibre ediliyor...");
    setStatusSub("Secde noktasına bakın");
  }, [stopAlert]);

  // ── MEDIAPIPE SONUÇLARI ─────────────────────────────────────────────────────
  const onResults = useCallback((results) => {
    if (!mountedRef.current) return;
    if (!results.multiFaceLandmarks?.length) {
      setNoFace(true); setStatusType("loading");
      setStatusTitle("Yüz algılanamıyor"); setStatusSub("Kamerayı biraz yaklaştırın");
      stopAlert(); return;
    }
    setNoFace(false);
    const lm = results.multiFaceLandmarks[0];
    if (eyeOpenRatio(lm) < 0.04) return;

    const gaze = getNormalizedGaze(lm);
    if (!gaze) return;

    if (!baselineRef.current) {
      calibFrames.current.push(gaze);
      const pct = Math.min(100, Math.round(calibFrames.current.length / CALIB_NEEDED * 100));
      setCalibPct(pct);
      setStatusTitle("Kalibre ediliyor...");
      setStatusSub(`%${pct} — secde noktasına bakın`);
      if (calibFrames.current.length >= CALIB_NEEDED) {
        const n = calibFrames.current.length;
        baselineRef.current = {
          x: calibFrames.current.reduce((s,f) => s+f.x, 0) / n,
          y: calibFrames.current.reduce((s,f) => s+f.y, 0) / n,
        };
        setStatusType("focused"); setStatusTitle("Huşu Aktif ✓"); setStatusSub("Gözleriniz secde noktasında");
      }
      return;
    }

    // Hassasiyet 10 = çok hassas (küçük eşik), 1 = az hassas (büyük eşik)
    const thr  = 0.065 + (10 - sensitivityRef.current) * 0.015; // 10→0.065, 1→0.20
    const dist = Math.abs(gaze.x - baselineRef.current.x) > thr ||
                 Math.abs(gaze.y - baselineRef.current.y) > thr;

    if (dist && !isDistracted.current) {
      isDistracted.current = true; startAlert();
      setStatusType("distracted"); setStatusTitle("Dikkat Dağıldı!");
      setStatusSub("Gözlerinizi secde noktasına çevirin");
    } else if (!dist && isDistracted.current) {
      isDistracted.current = false; stopAlert();
      setStatusType("focused"); setStatusTitle("Huşu Aktif ✓");
      setStatusSub("Gözleriniz secde noktasında");
    }
  }, [startAlert, stopAlert]);

  // ── MEDIAPIPE BAŞLAT ────────────────────────────────────────────────────────
  const initMediaPipe = useCallback(async (videoEl) => {
    setStatusTitle("Model yükleniyor..."); setStatusSub("Lütfen bekleyin");
    try {
      await loadScript("https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js");
      await loadScript("https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js");
      const fm = new window.FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
      fm.setOptions({ maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.3, minTrackingConfidence:0.3 });
      fm.onResults(onResults);
      faceMeshRef.current = fm;
      const cam = new window.Camera(videoEl, {
        onFrame: async () => { if (faceMeshRef.current) await faceMeshRef.current.send({ image:videoEl }); },
        width:1280, height:720
      });
      cam.start(); mpCamRef.current = cam;
      setStatusType("loading"); setStatusTitle("Kalibre ediliyor..."); setStatusSub("Secde noktasına bakın");
    } catch(e) {
      setStatusType("distracted"); setStatusTitle("Model Yüklenemedi"); setStatusSub(e.message);
    }
  }, [onResults]);

  // ── KAMERAYI AÇ ─────────────────────────────────────────────────────────────
  const startCamera = useCallback(async () => {
    if (!videoRef.current) return;
    setCamError(""); setNoFace(false);
    setStatusType("loading"); setStatusTitle("Kamera açılıyor..."); setStatusSub("İzin isteği gönderildi");
    try {
      const s = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: modeRef.current==="rear" ? "environment" : "user", width:{ideal:1280}, height:{ideal:720} }
      });
      streamRef.current = s;
      if (modeRef.current === "rear") torchTrack.current = s.getVideoTracks()[0];
      const vid = videoRef.current;
      vid.srcObject = s;
      vid.onloadedmetadata = async () => { await vid.play(); await initMediaPipe(vid); };
    } catch(err) {
      const msg = err.name === "NotAllowedError"
        ? "Kamera izni reddedildi.\n\nChrome'da izin vermek için:\nAdres çubuğu → 🔒 Kilit → Site Ayarları → Kamera → İzin Ver → Sayfayı yenile"
        : err.message;
      setCamError(msg);
    }
  }, [initMediaPipe]);

  // ── DURDUR ──────────────────────────────────────────────────────────────────
  const stopApp = useCallback(() => {
    stopAlert();
    mpCamRef.current?.stop(); mpCamRef.current = null; faceMeshRef.current = null;
    streamRef.current?.getTracks().forEach(t => t.stop()); streamRef.current = null;
    torchTrack.current = null; baselineRef.current = null;
    calibFrames.current = []; isDistracted.current = false;
    setCalibPct(0); setNoFace(false); setCamError(""); setScreen("setup");
  }, [stopAlert]);

  // ── GERİ SAYIM ile BAŞLAT ───────────────────────────────────────────────────
  const handleStart = useCallback(() => {
    setCountdown(3);
    let c = 3;
    const timer = setInterval(() => {
      c--;
      if (c <= 0) { clearInterval(timer); setCountdown(0); setScreen("camera"); }
      else setCountdown(c);
    }, 1000);
  }, []);

  useEffect(() => { if (screen === "camera") startCamera(); }, [screen]);

  const dotColor = statusType==="focused" ? "#52b788" : statusType==="distracted" ? "#e74c3c" : "#d4ac0d";

  return (
    <div style={{ fontFamily:"'Tajawal','Segoe UI',sans-serif", background:"#0a0e0c", minHeight:"100vh", color:"#e8f5ee" }}>

      {flashActive && (
        <div style={{ position:"fixed", inset:0, background:"white", zIndex:9999, pointerEvents:"none", animation:"flashPulse .5s ease-in-out infinite" }} />
      )}

      {/* ══════════════════ SETUP ══════════════════ */}
      {screen === "setup" && (
        <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
          padding:"40px 24px", gap:24, background:"radial-gradient(ellipse at 30% 20%,#1a2e22,#0a0e0c 65%)", animation:"fadeIn .4s ease",
          position:"relative", overflow:"hidden" }}>

          {/* Geri sayım overlay */}
          {countdown > 0 && (
            <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.85)", zIndex:50,
              display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16 }}>
              <div style={{ fontSize:11, letterSpacing:3, color:"#6b8f75", textTransform:"uppercase" }}>Hazırlanın</div>
              <div key={countdown} style={{ fontSize:120, fontWeight:700, color:"#52b788",
                textShadow:"0 0 40px rgba(82,183,136,0.6)", lineHeight:1,
                animation:"countPop .4s ease-out" }}>{countdown}</div>
              <div style={{ fontSize:14, color:"rgba(255,255,255,0.5)" }}>Secde noktasına bakın</div>
            </div>
          )}

          <div style={{ textAlign:"center" }}>
            <div style={{ fontFamily:"'Amiri',serif", fontSize:44, color:"#d4ac0d",
              textShadow:"0 0 30px rgba(212,172,13,.35)", lineHeight:1.2, marginBottom:8 }}>الخشوع في الصلاة</div>
            <div style={{ fontSize:18, fontWeight:600, letterSpacing:3 }}>NAMAZ HUŞU</div>
            <div style={{ fontSize:13, color:"#6b8f75", marginTop:4 }}>Göz takibi ile odak yardımcısı</div>
          </div>

          <div style={{ width:60, height:1, background:"linear-gradient(90deg,transparent,#52b788,transparent)" }} />

          {/* Mod kartları */}
          <div style={{ width:"100%", maxWidth:400 }}>
            <div style={{ fontSize:12, color:"#6b8f75", letterSpacing:2, textTransform:"uppercase", marginBottom:12 }}>Kamera Modu</div>
            {[
              { id:"front", icon:"📱", name:"Ön Kamera",  desc:"Ekran size dönük · Beyaz ekran yanıp söner" },
              { id:"rear",  icon:"🔦", name:"Arka Kamera", desc:"Kamera size dönük · Flaş yanıp söner"      },
            ].map(m => (
              <div key={m.id} onClick={() => setMode(m.id)} style={{
                display:"flex", alignItems:"center", gap:16, cursor:"pointer", marginBottom:12,
                background: mode===m.id ? "rgba(82,183,136,.08)" : "#16201a",
                border:`1.5px solid ${mode===m.id ? "#52b788" : "#1e2e24"}`,
                borderRadius:16, padding:"18px 20px", transition:"all .2s",
                boxShadow: mode===m.id ? "0 0 20px rgba(82,183,136,.1)" : "none"
              }}>
                <div style={{ width:52, height:52, borderRadius:14, fontSize:24, flexShrink:0,
                  display:"flex", alignItems:"center", justifyContent:"center",
                  background: mode===m.id ? "rgba(82,183,136,.2)" : "rgba(45,106,79,.15)",
                  border:`1px solid ${mode===m.id ? "#52b788" : "rgba(82,183,136,.2)"}` }}>{m.icon}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:16, fontWeight:600, marginBottom:3 }}>{m.name}</div>
                  <div style={{ fontSize:12, color:"#6b8f75", lineHeight:1.5 }}>{m.desc}</div>
                </div>
                <div style={{ width:22, height:22, borderRadius:"50%", flexShrink:0,
                  display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, color:"white",
                  background: mode===m.id ? "#52b788" : "transparent",
                  border:`2px solid ${mode===m.id ? "#52b788" : "#1e2e24"}` }}>{mode===m.id?"✓":""}</div>
              </div>
            ))}
          </div>

          {/* İpucu */}
          <div style={{ width:"100%", maxWidth:400, background:"rgba(183,149,11,.08)",
            border:"1px solid rgba(183,149,11,.22)", borderRadius:14, padding:"14px 18px" }}>
            <div style={{ fontSize:12, color:"#d4ac0d", fontWeight:600, marginBottom:6 }}>💡 Nasıl Kullanılır?</div>
            <div style={{ fontSize:12, color:"#6b8f75", lineHeight:1.9 }}>
              Telefonu namaz kıldığınız yerin önüne koyun.<br/>
              Kalibrasyon sırasında <b style={{ color:"#e8f5ee" }}>secde edeceğiniz yere</b> bakın.<br/>
              <b style={{ color:"#e8f5ee" }}>Baş hareketleri görmezden gelinir</b>, sadece göz kasları takip edilir.
            </div>
          </div>

          {/* Başlat butonu */}
          <button onClick={handleStart} disabled={countdown > 0} style={{
            width:"100%", maxWidth:400, padding:18,
            background: countdown > 0 ? "#1e2e24" : "linear-gradient(135deg,#2d6a4f,#40916c)",
            border:"none", borderRadius:16, color:"white", fontFamily:"inherit",
            fontSize:17, fontWeight:700, letterSpacing:1,
            cursor: countdown > 0 ? "default" : "pointer",
            boxShadow: countdown > 0 ? "none" : "0 4px 24px rgba(45,106,79,.45)",
            transition:"all .3s"
          }}>Başlat →</button>
        </div>
      )}

      {/* ══════════════════ CAMERA ══════════════════ */}
      {screen === "camera" && (
        <div style={{ position:"fixed", inset:0, background:"#000" }}>
          <video ref={videoRef} autoPlay playsInline muted style={{
            position:"absolute", inset:0, width:"100%", height:"100%", objectFit:"cover",
            transform: mode==="front" ? "scaleX(-1)" : "scaleX(1)" }} />

          {/* Üst bar */}
          <div style={{ position:"absolute", top:0, left:0, right:0, padding:"48px 20px 16px",
            background:"linear-gradient(to bottom,rgba(0,0,0,.75),transparent)",
            display:"flex", alignItems:"center", justifyContent:"space-between", zIndex:10 }}>
            <div onClick={stopApp} style={{ width:42, height:42, borderRadius:"50%",
              background:"rgba(255,255,255,.15)", border:"1px solid rgba(255,255,255,.2)",
              display:"flex", alignItems:"center", justifyContent:"center",
              fontSize:20, color:"white", cursor:"pointer" }}>←</div>
            <div style={{ background:"rgba(0,0,0,.5)", border:"1px solid rgba(255,255,255,.15)",
              borderRadius:20, padding:"6px 16px", fontSize:11, color:"rgba(255,255,255,.8)", letterSpacing:1.5 }}>
              {mode==="front" ? "ÖN KAMERA" : "ARKA KAMERA"}
            </div>
            <div onClick={resetCalib} style={{ width:42, height:42, borderRadius:"50%",
              background:"rgba(255,255,255,.15)", border:"1px solid rgba(255,255,255,.2)",
              display:"flex", alignItems:"center", justifyContent:"center",
              fontSize:18, cursor:"pointer" }} title="Yeniden kalibre et">🎯</div>
          </div>

          {/* Kamera hatası */}
          {camError && (
            <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", zIndex:20, padding:24 }}>
              <div style={{ background:"rgba(0,0,0,.92)", border:"1px solid rgba(255,80,80,.3)",
                borderRadius:20, padding:"28px 24px", textAlign:"center", maxWidth:320 }}>
                <div style={{ fontSize:36, marginBottom:12 }}>🚫</div>
                <div style={{ fontSize:15, fontWeight:600, marginBottom:12 }}>Kamera Erişimi Yok</div>
                <div style={{ fontSize:12, color:"rgba(255,255,255,.65)", lineHeight:1.8, whiteSpace:"pre-line", marginBottom:20 }}>{camError}</div>
                <button onClick={startCamera} style={{ padding:"12px 28px", background:"#2d6a4f",
                  border:"none", borderRadius:12, color:"white", fontFamily:"inherit", fontSize:14, fontWeight:600, cursor:"pointer" }}>Tekrar Dene</button>
              </div>
            </div>
          )}

          {/* Kalibrasyon */}
          {!camError && calibPct < 100 && (
            <div style={{ position:"absolute", top:"40%", left:"50%", transform:"translate(-50%,-50%)", zIndex:10, textAlign:"center", width:230 }}>
              <div style={{ fontSize:38, animation:"bounce 1s infinite", marginBottom:10 }}>👁️</div>
              <div style={{ background:"rgba(0,0,0,.7)", borderRadius:20, padding:"12px 20px",
                fontSize:13, color:"rgba(255,255,255,.9)", marginBottom:12 }}>
                Secde noktasına bakın<br/>
                <b style={{ color:"#52b788", fontSize:18 }}>%{calibPct}</b>
              </div>
              <div style={{ width:"100%", height:5, background:"rgba(255,255,255,.15)", borderRadius:3 }}>
                <div style={{ width:`${calibPct}%`, height:"100%", background:"linear-gradient(90deg,#2d6a4f,#52b788)", borderRadius:3, transition:"width .15s" }} />
              </div>
            </div>
          )}

          {/* Yüz yok */}
          {noFace && !camError && (
            <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", zIndex:8 }}>
              <div style={{ background:"rgba(0,0,0,.75)", border:"1px solid rgba(255,255,255,.15)",
                borderRadius:20, padding:"24px 32px", textAlign:"center" }}>
                <div style={{ fontSize:40, marginBottom:8 }}>🕌</div>
                <div style={{ fontSize:15, fontWeight:500 }}>Yüz algılanamıyor</div>
                <div style={{ fontSize:12, color:"rgba(255,255,255,.5)", marginTop:4 }}>Kamerayı biraz yaklaştırın</div>
              </div>
            </div>
          )}

          {/* Dikkat dağıldı */}
          {statusType === "distracted" && !camError && (
            <div style={{ position:"absolute", top:"36%", left:"50%", transform:"translateX(-50%)", zIndex:11, pointerEvents:"none" }}>
              <div style={{ background:"rgba(192,57,43,.9)", borderRadius:20, padding:"14px 32px",
                border:"1px solid rgba(255,100,100,.4)", animation:"pulsefast .6s infinite", textAlign:"center" }}>
                <div style={{ fontSize:22, fontWeight:700 }}>⚠️ Dikkat Dağıldı</div>
                <div style={{ fontSize:12, color:"rgba(255,255,255,.85)", marginTop:4 }}>Secde noktasına dönün</div>
              </div>
            </div>
          )}

          {/* Alt panel */}
          <div style={{ position:"absolute", bottom:0, left:0, right:0, padding:"20px 20px 44px",
            background:"linear-gradient(to top,rgba(0,0,0,.92),transparent)", zIndex:10 }}>
            <div style={{ display:"flex", alignItems:"center", gap:14, background:"rgba(0,0,0,.55)",
              borderRadius:16, padding:"16px 18px", border:"1px solid rgba(255,255,255,.08)", marginBottom:16 }}>
              <div style={{ width:14, height:14, borderRadius:"50%", flexShrink:0, background:dotColor,
                boxShadow:`0 0 10px ${dotColor}`, animation:`${statusType==="distracted"?"pulsefast .5s":"pulse 2s"} infinite` }} />
              <div style={{ flex:1 }}>
                <div style={{ fontSize:15, fontWeight:600 }}>{statusTitle}</div>
                <div style={{ fontSize:12, color:"rgba(255,255,255,.5)", marginTop:2 }}>{statusSub}</div>
              </div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <span style={{ fontSize:11, color:"rgba(255,255,255,.4)", whiteSpace:"nowrap" }}>Az Hassas</span>
              <input type="range" min={1} max={10} value={sensitivity} onChange={e => setSensitivity(+e.target.value)} />
              <span style={{ fontSize:11, color:"rgba(255,255,255,.4)", whiteSpace:"nowrap" }}>Çok Hassas</span>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
